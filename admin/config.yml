backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "images/uploads"

collections:
  - name: "gallery"
    label: "Fotos do Portfólio"
    files:
      - name: "gallery"
        label: "Galeria (Trabalhos)"
        file: "data/gallery.json"
        fields:
          - { label: "Fotos", name: "photos", widget: "list", fields: [
              { label: "Imagem", name: "image", widget: "image" },
              { label: "Descrição (opcional)", name: "alt", widget: "string", required: false }
            ] }

  - name: "services"
    label: "Serviços e Preços"
    files:
      - name: "services"
        label: "Tabela de Serviços"
        file: "data/services.json"
        fields:
          - label: "Grupos de Serviços"
            name: "groups"
            widget: "list"
            fields:
              - { label: "Nome do Grupo", name: "title", widget: "string" }
              - label: "Serviços"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Nome do Serviço", name: "name", widget: "string" }
                  - { label: "Preço (R$)", name: "price", widget: "string" }
                  - { label: "Descrição", name: "description", widget: "string", required: false }
